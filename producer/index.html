<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка инструкции — Панель сотрудника</title>
    <link rel="icon" href="../assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/css/producer.css">
</head>
<body>
<div class="container">
    <a class="back-link" href="../">← На главную</a>
    <a class="back-link" href="../admin/" style="margin-left: 16px;">Админ-панель</a>

    <h1>📄 Загрузить инструкцию</h1>
    <div class="sub">Создайте QR-код и карточку-шпаргалку за 2 минуты</div>

    <form id="uploadForm">
        <div class="form-group">
            <label for="modelSelect">Модель *</label>
            <select id="modelSelect" required>
                <option value="">— Выберите модель —</option>
            </select>
        </div>

        <div class="form-group">
            <label for="article">Артикул</label>
            <input type="text" id="article" readonly placeholder="Подставится из модели">
        </div>

        <div class="form-group">
            <label for="emailSelect">Email для уведомлений (логистам) *</label>
            <select id="emailSelect" required>
                <option value="">— Выберите получателя —</option>
            </select>
        </div>

        <div class="form-group">
            <label for="pdfFile">PDF-инструкция *</label>
            <input type="file" id="pdfFile" accept=".pdf" required>
        </div>

        <button type="submit">🚀 Сгенерировать QR и инструкцию</button>
    </form>

    <div id="result" class="result">
        <h3>✅ Готово!</h3>
        <div class="qr-code" id="qrContainer"></div>
        <div class="links">
            <strong>Ссылка на цифровую сборку:</strong><br>
            <span id="shortUrl"></span>
        </div>
        <button type="button" id="downloadCard" class="download-btn">📄 Скачать карточку-шпаргалку</button>
        <button type="button" id="downloadQr" class="download-btn download-btn--secondary">📷 Скачать QR-код</button>
    </div>

    <div id="error" class="error"></div>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/producer/upload.js"></script>
</body>
</html>
